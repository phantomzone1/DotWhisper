services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_cache:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=1h
      - OLLAMA_NO_CLOUD=1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1     
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    entrypoint: |
      /bin/sh -c "
      ollama serve &
      while ! ollama list > /dev/null 2>&1; do sleep 1; done
      ollama pull qwen2.5:1.5b
      wait
      "
    restart: unless-stopped

  whisper:
    image: fedirz/faster-whisper-server:latest-cuda    
    container_name: whisper-local
    environment:
      - WHISPER__MODEL=deepdml/faster-whisper-large-v3-turbo-ct2
      - WHISPER__INFERENCE_DEVICE=cuda
      - WHISPER__COMPUTE_TYPE=float16
      - WHISPER__TTL=3600
      - DEFAULT_LANGUAGE=en
      - ALLOW_ORIGINS=["*"]
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - HF_HUB_DISABLE_TELEMETRY=1      
    ports:
      - "10300:8000"
    volumes:
      - whisper_models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always

  open-webui:
    image: ghcr.io/open-webui/open-webui:cuda
    container_name: open-webui
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - 'WEBUI_AUTH=False'
      - 'DEVICE_TYPE=cuda'
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - 'AUDIO_STT_ENGINE=openai'
      - 'AUDIO_STT_OPENAI_API_BASE_URL=http://whisper-local:8000/v1'  # Changed to match container_name
      - 'AUDIO_STT_OPENAI_API_KEY=local'
      - 'AUDIO_STT_MODEL=turbo'
      - 'ENABLE_PERSISTENT_CONFIG=True'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - whisper
      - ollama                                                      # Added as a dependency
    restart: always

volumes:
  ollama_cache:                                                     # Added to top-level volumes
    external: true
  whisper_models:
    external: true
  open_webui_data:
    external: true

networks:
  default:
    name: ai-network
    external: true                                                 # Declared as external to match your setups